CONFIG_SERIAL=y
CONFIG_UART_NATIVE_PTY_0_ON_STDINOUT=y

# MCUmgr server with UART transport
CONFIG_MCUMGR=y
CONFIG_MCUMGR_TRANSPORT_UART=y

# Shell with dummy backend (required by shell management group)
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_DUMMY=y

# MCUmgr shell command execution group
CONFIG_MCUMGR_GRP_SHELL=y

# Dependencies of MCUMGR
CONFIG_NET_BUF=y
CONFIG_ZCBOR=y
CONFIG_BASE64=y
CONFIG_CRC=y
