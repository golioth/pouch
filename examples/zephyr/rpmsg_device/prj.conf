CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

CONFIG_LOG=y

# uart0 stays the console; uart1 carries the Pouch serial link on its own pty.
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y

CONFIG_POUCH=y
CONFIG_POUCH_TRANSPORT_SERIAL=y
CONFIG_POUCH_SERIAL_UART_DEVICE=y
CONFIG_POUCH_ENCRYPTION_NONE=y

CONFIG_GOLIOTH=y
CONFIG_GOLIOTH_SETTINGS=y
