CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

CONFIG_LOG=y

# uart0 stays the console; uart1 carries the Pouch serial link on its own pty.
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y

CONFIG_POUCH=y
CONFIG_POUCH_TRANSPORT_SERIAL=y
CONFIG_POUCH_SERIAL_UART_DEVICE=y

# Pouch uses SAEAD end-to-end encryption by default, which pulls in the PSA/
# mbedTLS crypto it needs. Provide the mbedTLS heap and disable the p256m
# driver (as the other examples do) so the SAEAD curves build.
CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_BUILTIN=y
CONFIG_MBEDTLS_ENABLE_HEAP=y
CONFIG_MBEDTLS_HEAP_SIZE=32768
CONFIG_MBEDTLS_PSA_P256M_DRIVER_ENABLED=n
CONFIG_MBEDTLS_PKCS5_C=n
CONFIG_TEST_RANDOM_GENERATOR=y
