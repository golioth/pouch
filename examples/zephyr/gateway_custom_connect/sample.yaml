sample:
  name: Pouch Gateway with custom connect
common:
  tags: bluetooth
  harness: pytest
  harness_config:
    pytest_root:
      - "../pytest/test_sample.py"
    pytest_dut_scope: module
    pytest_args:
      - --gateway-cloud
      - --target-domain=peripheral_ble_gatt_example_0
  sysbuild: true
  platform_allow:
    - nrf52_bsim
  integration_platforms:
    - nrf52_bsim
  timeout: 180
tests:
  pouch.gateway_custom_connect.lesc:
    extra_args:
      - 'SB_CONFIG_PERIPHERAL_MOUNT_CREDS="../creds"'
      - 'SB_CONFIG_GATEWAY_MOUNT_CREDS="../creds"'
      - peripheral_ble_gatt_example_0_CONFIG_PICOLIBC=y
      - peripheral_ble_gatt_example_0_CONFIG_FILE_SYSTEM_NSIM_MOUNT=y
      - peripheral_ble_gatt_example_0_CONFIG_EXAMPLE_SYNC_PERIOD_S=2
      - gateway_custom_connect_CONFIG_EXAMPLE_COAP_CLIENT_SYNC_PERIOD_S=2
  pouch.gateway_custom_connect.auth:
    extra_args:
      - 'SB_CONFIG_PERIPHERAL_MOUNT_CREDS="../creds"'
      - 'SB_CONFIG_GATEWAY_MOUNT_CREDS="../creds"'
      - peripheral_ble_gatt_example_0_CONFIG_PICOLIBC=y
      - peripheral_ble_gatt_example_0_CONFIG_FILE_SYSTEM_NSIM_MOUNT=y
      - peripheral_ble_gatt_example_0_CONFIG_EXAMPLE_SYNC_PERIOD_S=2
      - gateway_custom_connect_CONFIG_EXAMPLE_COAP_CLIENT_SYNC_PERIOD_S=2
      - gateway_custom_connect_CONFIG_POUCH_GATEWAY_GATT_SCAN_FILTER_BONDED=y
