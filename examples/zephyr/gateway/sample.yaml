sample:
  name: Pouch Gateway
common:
  tags: bluetooth
  harness: pytest
  sysbuild: true
  platform_allow:
    - nrf52_bsim
  integration_platforms:
    - nrf52_bsim
tests:
  pouch.gateway.lesc:
    timeout: 180
    harness_config:
      pytest_root:
        - ../pytest/test_sample.py
      pytest_dut_scope: module
      pytest_args:
        - --gateway-cloud
        - --target-domain=peripheral_ble_gatt_example_0
    extra_args:
      - 'SB_CONFIG_PERIPHERAL_MOUNT_CREDS="../creds"'
      - 'SB_CONFIG_GATEWAY_MOUNT_CREDS="../creds"'
      - peripheral_ble_gatt_example_0_CONFIG_PICOLIBC=y
      - peripheral_ble_gatt_example_0_CONFIG_FILE_SYSTEM_NSIM_MOUNT=y
      - peripheral_ble_gatt_example_0_CONFIG_EXAMPLE_SYNC_PERIOD_S=2
      - gateway_CONFIG_EXAMPLE_COAP_CLIENT_SYNC_PERIOD_S=2
  pouch.gateway.auth:
    timeout: 180
    harness_config:
      pytest_root:
        - ../pytest/test_sample.py
      pytest_dut_scope: module
      pytest_args:
        - --gateway-cloud
        - --target-domain=peripheral_ble_gatt_example_0
    extra_args:
      - 'SB_CONFIG_PERIPHERAL_MOUNT_CREDS="../creds"'
      - 'SB_CONFIG_GATEWAY_MOUNT_CREDS="../creds"'
      - peripheral_ble_gatt_example_0_CONFIG_PICOLIBC=y
      - peripheral_ble_gatt_example_0_CONFIG_FILE_SYSTEM_NSIM_MOUNT=y
      - peripheral_ble_gatt_example_0_CONFIG_EXAMPLE_SYNC_PERIOD_S=2
      - gateway_CONFIG_EXAMPLE_COAP_CLIENT_SYNC_PERIOD_S=2
      - gateway_CONFIG_POUCH_GATEWAY_GATT_SCAN_FILTER_BONDED=y
  pouch.gateway.ota:
    timeout: 300
    harness_config:
      pytest_root:
        - ../pytest/test_ota.py
      pytest_dut_scope: module
      pytest_args:
        - --gateway-cloud
        - --target-domain=peripheral_ble_gatt_example_0
        # Keep the image small: BLE-tunneled OTA is much slower than the
        # direct coap/http_client tests.
        - --ota-image-size=8192
    extra_args:
      - 'SB_CONFIG_PERIPHERAL_MOUNT_CREDS="../creds"'
      - 'SB_CONFIG_GATEWAY_MOUNT_CREDS="../creds"'
      - peripheral_ble_gatt_example_0_CONFIG_PICOLIBC=y
      - peripheral_ble_gatt_example_0_CONFIG_FILE_SYSTEM_NSIM_MOUNT=y
      - peripheral_ble_gatt_example_0_CONFIG_EXAMPLE_SYNC_PERIOD_S=2
      - peripheral_ble_gatt_example_0_CONFIG_EXAMPLE_FW_UPDATE_SHA256_VERIFY=y
      - peripheral_ble_gatt_example_0_CONFIG_GOLIOTH_OTA_MAX_VERSION_LEN=64
      - peripheral_ble_gatt_example_0_EXTRA_CONF_FILE=../gateway/overlay-ble_gatt-ci-ota.conf
      - gateway_CONFIG_EXAMPLE_COAP_CLIENT_SYNC_PERIOD_S=2
