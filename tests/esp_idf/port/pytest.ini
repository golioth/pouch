[pytest]
# Suppress the experimental API warning
filterwarnings =
    ignore:record_xml_attribute is an experimental feature:pytest.PytestExperimentalApiWarning

# Resolve PytestWarning: record_xml_attribute is incompatible with junit_family 'xunit2'
junit_family = legacy
