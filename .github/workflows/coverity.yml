name: "Coverity"

on:
  schedule:
    # Run workflow every Sunday
    - cron: "00 0 * * 0"
  workflow_dispatch:

jobs:
  coverity:
    runs-on: ubuntu-24.04
    container: golioth/golioth-coverity-base:89df175

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: pouch
      - name: Init and update west
        run: |
          west init -l pouch --mf west-ncs.yml
          west update --narrow -o=--depth=1
      - name: Install pip packages
        run: |
          uv pip install \
            -r zephyr/scripts/requirements-base.txt

          uv pip install \
            -r pouch/requirements-ci-zephyr.txt \
            --require-hashes

      - name: Coverity build
        run: |
          /opt/toolchains/coverity/bin/cov-configure --comptype gcc \
            --compiler /opt/toolchains/zephyr-sdk-0.17.0/arm-zephyr-eabi/bin/arm-zephyr-eabi-gcc
          /opt/toolchains/coverity/bin/cov-build --dir cov-int \
            west build -p -b nrf52840dk/nrf52840 pouch/examples/zephyr/ble_gatt \
            -- -DCONFIG_LOG=n
          /opt/toolchains/coverity/bin/cov-build --dir cov-int --append \
            west build -p -b nrf9160dk/nrf9160/ns pouch/examples/zephyr/gateway \
            -- -DCONFIG_NET_LOG=n -DCONFIG_LOG=n
          tar czvf pouch.tgz cov-int
          curl --form token=${{ secrets.POUCH_COVERITY_TOKEN }} \
            --form email=sam@golioth.io \
            --form file=@pouch.tgz \
            --form version="0" \
            --form description="Description" \
            https://scan.coverity.com/builds?project=golioth%2Fpouch
      - uses: actions/upload-artifact@v6
        with:
          name: coverity_output
          path: pouch.tgz
