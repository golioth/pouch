name: "Trigger: PR and Merge"

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  trigger-lint:
    name: Run Lint
    uses: ./.github/workflows/lint.yml
    secrets: inherit
  trigger-build:
    name: Run Build
    uses: ./.github/workflows/test-build.yml
    secrets: inherit
  trigger-twister:
    name: Run Twister
    uses: ./.github/workflows/test-twister.yml
    secrets: inherit
  trigger-test-summaries:
    name: Publish JUnit Summaries
    if: success() || failure()
    needs:
      - trigger-twister
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Gather summaries
        uses: actions/download-artifact@v8
        with:
          path: summary
          pattern: ci-summary-*
          merge-multiple: true

      - name: Publish Test Report
        uses: phoenix-actions/test-reporting@v15
        if: success() || failure()
        with:
          name: Firmware Test Summary
          path: summary/*.xml
          reporter: java-junit
          list-tests: failed
          output-to: step-summary
  trigger-build-esp-idf:
    name: PortMigration Build ESP-IDF
    uses: ./.github/workflows/test-build-esp-idf.yml
    secrets: inherit
