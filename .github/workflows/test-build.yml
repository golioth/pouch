name: Build Examples

on:
  workflow_call:
  workflow_dispatch:

jobs:
  build:
    container: golioth/golioth-zephyr-base:0.17.4-SDK-v0
    strategy:
      matrix:
        include:
          - manifest: west-zephyr.yml
            example: ble_gatt
            board: nrf52840dk/nrf52840
          - manifest: west-ncs.yml
            example: ble_gatt
            board: nrf52840dk/nrf52840
          - manifest: west-zephyr.yml
            example: http_client
            board: frdm_rw612
          - manifest: west-zephyr.yml
            example: http_client
            board: native_sim
            no_sysbuild: true
      fail-fast: false
    env:
      ZEPHYR_SDK_INSTALL_DIR: /opt/toolchains/zephyr-sdk-0.17.4
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: pouch

      - name: Init and update west
        run: |
          west init -l pouch --mf ${{ matrix.manifest }}
          west update --narrow -o=--depth=1

      - name: Install pip packages
        run: |
          uv pip install \
            -r zephyr/scripts/requirements-base.txt        \
            -r zephyr/scripts/requirements-build-test.txt  \
            -r zephyr/scripts/requirements-run-test.txt

          uv pip install \
            -r pouch/requirements-ci-zephyr.txt \
            --require-hashes

      - name: Compile
        shell: bash
        run: |
          if [[ "${{ matrix.no_sysbuild }}" == "true" ]]; then
            SYSBUILD_FLAG=""
          else
            SYSBUILD_FLAG="--sysbuild"
          fi

          west build ${SYSBUILD_FLAG} -p -b ${{ matrix.board }} pouch/examples/zephyr/${{ matrix.example }}
