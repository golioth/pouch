name: "Lint"

on:
  workflow_call:

jobs:
  clang-format:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Fetch depth must be greater than the number of commits included in the push in order to
          # compare against commit prior to merge. 15 is chosen as a reasonable default for the
          # upper bound of commits in a single PR.
          fetch-depth: 15

      - name: Install clang-format
        shell: bash
        run: pip install -r requirements-lint.txt --require-hashes

      - name: Run linter
        shell: bash
        run: |
          git fetch --no-recurse-submodules
          if [[ $GITHUB_EVENT_NAME == 'push' ]]; then
              BASE=${{ github.event.before }}
          else
              BASE=origin/$GITHUB_BASE_REF
          fi
          git clang-format --verbose --extensions c,h --diff --diffstat $BASE

  ruff:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Fetch depth must be greater than the number of commits included in the push in order to
          # compare against commit prior to merge. 15 is chosen as a reasonable default for the
          # upper bound of commits in a single PR.
          fetch-depth: 15

      - name: Install ruff
        shell: bash
        run: pip install -r requirements-lint.txt --require-hashes

      - name: Run ruff check
        shell: bash
        run: ruff check .

      - name: Run ruff format check
        shell: bash
        run: ruff format --check .
