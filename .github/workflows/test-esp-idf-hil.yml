name: ESP-IDF HIL

on:
  workflow_dispatch:
    inputs:
      hil_board:
        description: Self-hosted runner label for HIL board
        required: true
        type: string
      idf_target:
        description: ESP-IDF target (for example esp32s3)
        required: true
        type: string
      api_url:
        description: API gateway URL for Golioth backend services
        required: true
        type: string
      api_key_id:
        description: Name of GitHub secret containing project API key
        required: true
        type: string
  workflow_call:
    inputs:
      hil_board:
        description: Self-hosted runner label for HIL board
        required: true
        type: string
      idf_target:
        description: ESP-IDF target (for example esp32s3)
        required: true
        type: string
      api_url:
        description: API gateway URL for Golioth backend services
        required: true
        type: string
      api_key_id:
        description: Name of GitHub secret containing project API key
        required: true
        type: string

jobs:
  build:
    permissions:
      contents: read
      actions: write
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix: &hil-matrix
        include:
          - name: http_client
            dir: examples/esp_idf/http_client
          - name: ble_gatt
            dir: examples/esp_idf/ble_gatt
    # ESP-IDF v6.0.1
    container: espressif/idf@sha256:efc19fae2f52fc6873630c668da26aa834139a063b5fb73a46ebc0dbd217b587
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: recursive

      - name: Build firmware and merged image
        shell: bash
        run: |
          . "$IDF_PATH/export.sh"

          # Install Pouch dependencies
          pip install -r requirements-ci-esp-idf.txt --require-hashes

          # Prepare App Version
          cd ${{ matrix.dir }}
          cat <<EOF > fw_update.defaults
          CONFIG_EXAMPLE_FW_UPDATE_COMPONENT="hil_ota_${{ inputs.idf_target }}_${{ matrix.name }}"
          CONFIG_APP_PROJECT_VER="1.2.3"
          EOF
          cd -

          # Shorter 10s sync delay for HIL testing and package name/version
          export SDKCONFIG_DEFAULTS="sdkconfig.defaults;pytest/sdkconfig.pytest.defaults;fw_update.defaults"

          idf.py -C "${{ matrix.dir }}" set-target "${{ inputs.idf_target }}"
          idf.py -C "${{ matrix.dir }}" build
          idf.py -C "${{ matrix.dir }}" merge-bin -o merged.bin

          cd "${{ matrix.dir }}"
          shopt -s globstar nullglob

          artifact_files=(
            build/flasher_args.json
            build/**/*.bin
            build/*.elf
          )

          tar -cf build-artifacts.tar "${artifact_files[@]}"

      - name: Build update version of firmware
        shell: bash
        run: |
          . "$IDF_PATH/export.sh"

          # Ensure we can query the short hash
          git config --global --add safe.directory $GITHUB_WORKSPACE

          # Prepare App Update Version
          cd ${{ matrix.dir }}
          cat <<EOF > fw_update.defaults
          CONFIG_EXAMPLE_FW_UPDATE_COMPONENT="hil_ota_${{ inputs.idf_target }}_${{ matrix.name }}"
          CONFIG_APP_PROJECT_VER="$(git rev-parse --short HEAD)"
          EOF
          cd -

          # Shorter 10s sync delay for HIL testing and package name/version
          export SDKCONFIG_DEFAULTS="sdkconfig.defaults;pytest/sdkconfig.pytest.defaults;fw_update.defaults"

          rm -f "${{ matrix.dir }}/sdkconfig"
          idf.py -C "${{ matrix.dir }}" reconfigure
          idf.py -C "${{ matrix.dir }}" build

          # Find the app update binary, rename, and include in the artifact upload
          cd "${{ matrix.dir }}"
          APP_BIN=$(python3 -c "import json; print(json.load(open('build/flasher_args.json'))['app']['file'])")
          cp "build/${APP_BIN}" "build/${{ matrix.name }}_${{ inputs.idf_target }}_fwupdate.bin"
          tar -rf build-artifacts.tar "build/${{ matrix.name }}_${{ inputs.idf_target }}_fwupdate.bin"

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: esp-idf-${{ matrix.name }}-${{ inputs.idf_target }}-build
          path: ${{ matrix.dir }}/build-artifacts.tar

  hil-test:
    permissions:
      contents: read
      actions: write

    needs:
      - build

    strategy:
      fail-fast: false
      matrix: *hil-matrix

    runs-on:
      - is_active
      - has_${{ inputs.hil_board }}
      - has_frdm_rw612

    container:
      image: golioth/golioth-hil-base:latest
      volumes:
        - /dev:/dev
        - /home/golioth/credentials:/opt/credentials
      options: --privileged

    env:
      HIL_BOARD: ${{ inputs.hil_board }}
      GOLIOTH_API_URL: ${{ inputs.api_url }}
      GOLIOTH_API_KEY: ${{ secrets[inputs.api_key_id] }}
      IDF_TARGET: ${{ inputs.idf_target }}
      SAMPLE_DIR: ${{ matrix.dir }}
      UNITY_REPORT_NAME: integration-esp-idf-${{ matrix.name }}-hil.xml

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: recursive

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Clean stale run assets
        run: |
          rm -rf "$SAMPLE_DIR/build"
          rm -f "$UNITY_REPORT_NAME" "pytest-${{ matrix.name }}-hil.log"

      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: esp-idf-${{ matrix.name }}-${{ inputs.idf_target }}-build
          path: esp-idf-${{ matrix.name }}

      - name: Extract build artifact
        run: |
          tar -xf "esp-idf-${{ matrix.name }}/build-artifacts.tar" -C "$SAMPLE_DIR"

      - name: Download gateway firmware
        if: matrix.name == 'ble_gatt'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: gateway-frdm_rw612-ethernet
          path: gateway-frdm_rw612

      - name: Power On USB Hub
        run: python3 /opt/golioth-scripts/usb_hub_power.py on

      - name: Flash gateway firmware to frdm_rw612
        if: matrix.name == 'ble_gatt'
        shell: bash
        run: |
          source /opt/credentials/runner_env.sh
          export PATH=$PATH:/opt/SEGGER/JLink
          export SNR_VAR=CI_FRDM_RW612_SNR

          if [ -z "${!SNR_VAR}" ]; then
            echo "Runner environment variable '$SNR_VAR' is not set"
            exit 1
          fi

          cat <<EOF > flash_frdm_rw612.jlink
          r
          h
          loadfile gateway-frdm_rw612/zephyr.hex
          r
          sleep 3
          q
          EOF

          JLinkExe \
            -nogui 1 \
            -if swd \
            -speed auto \
            -device RW612 \
            -CommanderScript flash_frdm_rw612.jlink \
            -SelectEmuBySN "${!SNR_VAR}"

      - name: Install pytest dependencies
        run: |
          uv pip install \
            -r requirements-ci-esp-idf.txt \
            --require-hashes

          uv pip install \
            "golioth@git+https://github.com/golioth/python-golioth-tools@v0.8.1"

      - name: Run HIL pytest
        shell: bash
        env:
          SAMPLE_NAME: ${{ matrix.name }}
          WIFI_SSID: ${{ matrix.name != 'ble_gatt' && secrets[format('{0}_WIFI_SSID', runner.name)] || '' }}
          WIFI_PSK: ${{ matrix.name != 'ble_gatt' && secrets[format('{0}_WIFI_PSK', runner.name)] || '' }}
        run: |
          # Config so we can use tee to keep a copy of pytest logs
          set -o pipefail

          source /opt/credentials/runner_env.sh
          PORT_VAR=CI_${HIL_BOARD^^}_PORT
          if [ -z "${!PORT_VAR}" ]; then
            echo "Runner environment variable '$PORT_VAR' is not set"
            exit 1
          fi

          # Ensure we can query the short hash
          git config --global --add safe.directory $GITHUB_WORKSPACE

          WIFI_ARGS=""
          if [ "$SAMPLE_NAME" != "ble_gatt" ]; then
            WIFI_ARGS="--wifi-ssid $WIFI_SSID --wifi-psk $WIFI_PSK"
          fi

          GATEWAY_PORT_ARG=""
          if [ "$SAMPLE_NAME" == "ble_gatt" ]; then
            GW_PORT_VAR=CI_FRDM_RW612_PORT
            if [ -n "${!GW_PORT_VAR}" ]; then
              GATEWAY_PORT_ARG="--gateway-port ${!GW_PORT_VAR}"
            fi
          fi

          pytest -vv -rs -s                  \
            -c "$SAMPLE_DIR/pytest.ini"      \
            --rootdir "$SAMPLE_DIR"          \
            --embedded-services esp,idf      \
            --target "$IDF_TARGET"           \
            --port "${!PORT_VAR}"            \
            --app-path "$SAMPLE_DIR"         \
            --build-dir build                \
            --fw-update-bin "$SAMPLE_DIR/build/${{ matrix.name }}_${{ inputs.idf_target }}_fwupdate.bin" \
            --fw-update-ver "$(git rev-parse --short HEAD)" \
            --fw-update-pkg-name "hil_ota_${IDF_TARGET}_${{ matrix.name }}"      \
            --erase-all n                    \
            --api-url "$GOLIOTH_API_URL"     \
            --api-key "$GOLIOTH_API_KEY"     \
            $WIFI_ARGS                       \
            $GATEWAY_PORT_ARG                \
            --generate-certs                 \
            --junit-xml "$UNITY_REPORT_NAME" \
            "$SAMPLE_DIR/pytest/test_sample.py" | tee pytest-${{ matrix.name }}-hil.log

      - name: Post-process JUnit XML
        if: success() || failure()
        run: |
          python3 tests/esp_idf/port/junit_post_process.py "$UNITY_REPORT_NAME"

      - name: Upload CI report summary
        uses: ./.github/actions/safe-upload-artifacts
        if: success() || failure()
        with:
          secrets-json: ${{ toJson(secrets) }}
          name: ci-summary-integration-esp-idf-${{ matrix.name }}-hil
          path: ${{ env.UNITY_REPORT_NAME }}

      - name: Upload HIL run artifacts
        uses: ./.github/actions/safe-upload-artifacts
        if: success() || failure()
        with:
          secrets-json: ${{ toJson(secrets) }}
          name: esp-idf-${{ matrix.name }}-hil-artifacts
          path: |
            pytest-${{ matrix.name }}-hil.log
            ${{ env.UNITY_REPORT_NAME }}

      - name: Erase flash
        if: always()
        shell: bash
        run: |
          source /opt/credentials/runner_env.sh
          PORT_VAR=CI_${HIL_BOARD^^}_PORT
          if [ -z "${!PORT_VAR}" ]; then
            echo "Runner environment variable '$PORT_VAR' is not set"
            exit 1
          fi
          esptool.py --port "${!PORT_VAR}" erase_flash

      - name: Erase gateway flash
        if: always() && matrix.name == 'ble_gatt'
        shell: bash
        run: |
          source /opt/credentials/runner_env.sh
          export PATH=$PATH:/opt/SEGGER/JLink
          export SNR_VAR=CI_FRDM_RW612_SNR

          if [ -z "${!SNR_VAR}" ]; then
            echo "Runner environment variable '$SNR_VAR' is not set"
            exit 1
          fi

          cat <<EOF > erase_frdm_rw612.jlink
          r
          h
          exec EnableEraseAllFlashBanks
          erase 0x8000000 0x8624000
          sleep 30
          r
          sleep 3
          q
          EOF

          JLinkExe \
            -nogui 1 \
            -if swd \
            -speed auto \
            -device RW612 \
            -CommanderScript erase_frdm_rw612.jlink \
            -SelectEmuBySN "${!SNR_VAR}"

      - name: Power Off USB Hub
        if: always()
        run: python3 /opt/golioth-scripts/usb_hub_power.py off
